name: Build CareerGuide APK

# Builds a ready-to-install debug APK automatically every time you push
# to this repository (or you can trigger it manually from the Actions tab).
# No Android Studio or local setup needed — GitHub's servers do the build.

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CareerGuideApp

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Inject Groq API Key
        run: echo "groq.api.key=${{ secrets.GROQ_API_KEY }}" >> local.properties

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: CareerGuideIndia-debug-apk
          path: CareerGuideApp/app/build/outputs/apk/debug/app-debug.apk
