<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Crossroads Quest — CareerGuide India</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="assessment-page game-page">

<nav class="navbar">
  <div class="container nav-container">
    <div class="logo-section">
      <h1 class="logo"><span class="logo-mark"></span> CareerGuide India</h1>
    </div>
    <a href="#" class="nav-back-btn" id="navBackBtn">← Back</a>
  </div>
</nav>

<div class="game-hud">
  <div class="container hud-inner">
    <div class="hud-levels" id="hudLevels">
      <div class="hud-dot active" data-level="1"><span>1</span>Character</div>
      <div class="hud-dot" data-level="2"><span>2</span>Story Quest</div>
      <div class="hud-dot" data-level="3"><span>3</span>Like or Skip</div>
      <div class="hud-dot" data-level="4"><span>4</span>Choose Path</div>
    </div>
    <div class="hud-xp">
      <span class="xp-label">XP</span>
      <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
      <span class="xp-value" id="xpValue">0</span>
    </div>
  </div>
</div>

<div class="game-container">
  <div id="gameStage" class="game-stage"><!-- injected by game.js --></div>
</div>

<!-- Exit Confirmation Modal -->
<div id="exitModal" class="modal-overlay">
  <div class="modal-card">
    <h3 class="modal-title">Exit Assessment?</h3>
    <p class="modal-text">Do you want to exit the assessment? Your current progress will be lost.</p>
    <div class="modal-actions">
      <button class="btn-modal btn-confirm" id="confirmExitBtn">Yes, Exit</button>
      <button class="btn-modal btn-cancel" id="cancelExitBtn">No, Keep Playing</button>
    </div>
  </div>
</div>

<div id="xpToast" class="xp-toast"></div>
<div id="levelBanner" class="level-banner"></div>
<div id="confettiLayer" class="confetti-layer"></div>

<script src="js/career_engine.js?v=99"></script>
<script src="js/game.js?v=99"></script>
</body>
</html>
