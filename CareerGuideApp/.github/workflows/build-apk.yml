name: Build CareerGuide APK

# Builds a ready-to-install debug APK automatically every time you push
# to this repository (or you can trigger it manually from the Actions tab).
# No Android Studio or local setup needed — GitHub's servers do the build.

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: CareerGuideIndia-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
