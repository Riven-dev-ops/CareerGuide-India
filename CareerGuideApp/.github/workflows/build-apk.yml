name: Build CareerGuide APK

# Builds a ready-to-install debug APK automatically every time you push
# to this repository (or you can trigger it manually from the Actions tab).
# No Android Studio or local setup needed — GitHub's servers do the build.

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
          fi

      - name: Inject Groq API key into local.properties
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "groq.api.key=${GROQ_API_KEY}" >> local.properties

      - name: Build debug APK
        run: |
          if [ -f gradlew ]; then
            ./gradlew assembleDebug --no-daemon
          else
            gradle assembleDebug --no-daemon
          fi

      - name: Upload APK as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: CareerGuideIndia-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
